# AgentHUD — minimal CI: stale-feature audit + Node unit tests (no npm install).
name: CI

concurrency:
  group: agenthud-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit + unit tests
        run: npm run verify
